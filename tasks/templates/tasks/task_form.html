{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Manage Task - ProTasker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-white">
                <h3 class="mb-0">{% if object %}Edit{% else %}Add New{% endif %} Task</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% if object %}{% url 'project-detail' object.project.id %}{% else %}{% url 'project-detail' view.kwargs.project_id %}{% endif %}" class="btn btn-outline-secondary">Cancel</a>
                        <button type="submit" class="btn btn-primary">Save Task</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
