{% extends 'base.html' %}

{% block title %}Delete Task - ProTasker{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm border-danger">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0 h5">Delete Task</h3>
            </div>
            <div class="card-body text-center">
                <p class="lead">Are you sure you want to delete the task "<strong>{{ object.title }}</strong>"?</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center mt-4">
                        <a href="{% url 'project-detail' object.project.id %}" class="btn btn-outline-secondary me-2">Cancel</a>
                        <button type="submit" class="btn btn-danger">Confirm Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
